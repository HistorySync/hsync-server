# HistorySync Cloud Server - Production Template
#
# This stack runs the CE application with PostgreSQL and Redis. Object storage is
# intentionally external: use any S3-compatible service or an operator-managed
# MinIO deployment and provide its endpoint/credentials through .env.
#
# First-run shape:
#   docker compose --env-file deployments/.env.production.example \
#     -f deployments/docker-compose.production.yml config
#   cp deployments/.env.production.example deployments/.env.production
#   # fill real secrets in deployments/.env.production, then:
#   docker compose --env-file deployments/.env.production \
#     -f deployments/docker-compose.production.yml run --rm doctor
#   docker compose --env-file deployments/.env.production \
#     -f deployments/docker-compose.production.yml run --rm migrate
#   docker compose --env-file deployments/.env.production \
#     -f deployments/docker-compose.production.yml up -d server

services:
  doctor:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["doctor", "--format", "human"]
    environment:
      HSYNC_DATABASE_URL: postgres://hsync:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}@postgres:5432/${POSTGRES_DB:-hsync}?sslmode=disable
      HSYNC_REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD in .env.production}@redis:6379/0
      HSYNC_LISTEN_ADDR: ":8080"
      HSYNC_LOG_LEVEL: ${HSYNC_LOG_LEVEL:-info}
      HSYNC_STRIPE_DISABLED: "true"
      HSYNC_S3_ENDPOINT: ${HSYNC_S3_ENDPOINT:?set HSYNC_S3_ENDPOINT in .env.production}
      HSYNC_S3_BUCKET: ${HSYNC_S3_BUCKET:?set HSYNC_S3_BUCKET in .env.production}
      HSYNC_S3_ACCESS_KEY: ${HSYNC_S3_ACCESS_KEY:?set HSYNC_S3_ACCESS_KEY in .env.production}
      HSYNC_S3_SECRET_KEY: ${HSYNC_S3_SECRET_KEY:?set HSYNC_S3_SECRET_KEY in .env.production}
      HSYNC_S3_USE_SSL: ${HSYNC_S3_USE_SSL:-true}
      HSYNC_JWT_PRIVATE_KEY: ${HSYNC_JWT_PRIVATE_KEY:?set HSYNC_JWT_PRIVATE_KEY in .env.production}
      HSYNC_SECURITY_SECRET: ${HSYNC_SECURITY_SECRET:?set HSYNC_SECURITY_SECRET in .env.production}
      HSYNC_ADMIN_KEY: ${HSYNC_ADMIN_KEY:?set HSYNC_ADMIN_KEY in .env.production}
      HSYNC_PUBLIC_URL: ${HSYNC_PUBLIC_URL:?set HSYNC_PUBLIC_URL in .env.production}
      HSYNC_METRICS_ENABLED: ${HSYNC_METRICS_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"
    networks:
      - internal
    profiles:
      - tools

  migrate:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["migrate", "up"]
    environment:
      HSYNC_DATABASE_URL: postgres://hsync:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}@postgres:5432/${POSTGRES_DB:-hsync}?sslmode=disable
      HSYNC_REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD in .env.production}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - internal
    profiles:
      - tools

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      HSYNC_DATABASE_URL: postgres://hsync:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}@postgres:5432/${POSTGRES_DB:-hsync}?sslmode=disable
      HSYNC_REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD in .env.production}@redis:6379/0
      HSYNC_LISTEN_ADDR: ":8080"
      HSYNC_LOG_LEVEL: ${HSYNC_LOG_LEVEL:-info}
      HSYNC_STRIPE_DISABLED: "true"
      HSYNC_S3_ENDPOINT: ${HSYNC_S3_ENDPOINT:?set HSYNC_S3_ENDPOINT in .env.production}
      HSYNC_S3_BUCKET: ${HSYNC_S3_BUCKET:?set HSYNC_S3_BUCKET in .env.production}
      HSYNC_S3_ACCESS_KEY: ${HSYNC_S3_ACCESS_KEY:?set HSYNC_S3_ACCESS_KEY in .env.production}
      HSYNC_S3_SECRET_KEY: ${HSYNC_S3_SECRET_KEY:?set HSYNC_S3_SECRET_KEY in .env.production}
      HSYNC_S3_USE_SSL: ${HSYNC_S3_USE_SSL:-true}
      HSYNC_JWT_PRIVATE_KEY: ${HSYNC_JWT_PRIVATE_KEY:?set HSYNC_JWT_PRIVATE_KEY in .env.production}
      HSYNC_SECURITY_SECRET: ${HSYNC_SECURITY_SECRET:?set HSYNC_SECURITY_SECRET in .env.production}
      HSYNC_ADMIN_KEY: ${HSYNC_ADMIN_KEY:?set HSYNC_ADMIN_KEY in .env.production}
      HSYNC_PUBLIC_URL: ${HSYNC_PUBLIC_URL:?set HSYNC_PUBLIC_URL in .env.production}
      HSYNC_METRICS_ENABLED: ${HSYNC_METRICS_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${HSYNC_BIND_ADDR:-127.0.0.1}:${HSYNC_HTTP_PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/readyz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hsync}
      POSTGRES_USER: hsync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backups/postgres:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command:
      - sh
      - -c
      - exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD" --maxmemory "$$REDIS_MAXMEMORY" --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env.production}
      REDIS_MAXMEMORY: ${REDIS_MAXMEMORY:-512mb}
    restart: unless-stopped
    networks:
      - internal

  postgres-backup:
    image: postgres:16-alpine
    command:
      - sh
      - -c
      - pg_dump -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -Fc -f "/backup/hsync-$$(date +%Y%m%d%H%M%S).dump"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hsync}
      POSTGRES_USER: hsync
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}
    volumes:
      - ./backups/postgres:/backup
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - internal
    profiles:
      - backup

volumes:
  pg_data:
  redis_data:

networks:
  internal:
    driver: bridge
