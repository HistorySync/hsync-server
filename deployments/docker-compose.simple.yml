# HistorySync Cloud Server - Self-Hosted (Single Instance)
# Minimal deployment for personal VPS / NAS usage.
# No billing, no Redis cluster, local MinIO for storage.
#
# Usage:
#   1. Generate JWT and security keys: openssl rand -base64 32
#   2. Set DB_PASSWORD, JWT_PRIVATE_KEY, SECURITY_SECRET, S3_ACCESS_KEY, and
#      S3_SECRET_KEY in .env
#   3. docker compose -f docker-compose.simple.yml up -d

version: "3.9"

services:
  migrate:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["migrate", "up"]
    environment:
      - HSYNC_DATABASE_URL=postgres://hsync:${DB_PASSWORD:?set DB_PASSWORD in .env}@postgres:5432/hsync?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - HSYNC_DATABASE_URL=postgres://hsync:${DB_PASSWORD:?set DB_PASSWORD in .env}@postgres:5432/hsync?sslmode=disable
      - HSYNC_REDIS_URL=redis://redis:6379/0
      - HSYNC_S3_ENDPOINT=minio:9000
      - HSYNC_S3_BUCKET=hsync-bundles
      - HSYNC_S3_ACCESS_KEY=${S3_ACCESS_KEY:?set S3_ACCESS_KEY in .env}
      - HSYNC_S3_SECRET_KEY=${S3_SECRET_KEY:?set S3_SECRET_KEY in .env}
      - HSYNC_S3_USE_SSL=false
      - HSYNC_JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY:?set JWT_PRIVATE_KEY in .env}
      - HSYNC_SECURITY_SECRET=${SECURITY_SECRET:?set SECURITY_SECRET in .env}
      - HSYNC_STRIPE_DISABLED=true
      - HSYNC_LOG_LEVEL=info
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - server_data:/app/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hsync
      POSTGRES_USER: hsync
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hsync"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY in .env}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set S3_SECRET_KEY in .env}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"  # MinIO Console (optional, remove in production)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  server_data:
  pg_data:
  redis_data:
  minio_data:
