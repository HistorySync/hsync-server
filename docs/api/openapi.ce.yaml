  /api/v1/admin/exports/operational-records:
    get:
      tags: [Admin Ops]
      summary: Export CE operational records
      operationId: ceAdminExportOperationalRecordsV1
      description: Requires `X-Admin-Key`. `format=csv` returns `text/csv`.
      security:
        - adminKey: []
      parameters:
        - name: record_type
          in: query
          required: true
          schema:
            type: string
            enum: [audit_logs, ops_history, notification_outbox]
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
            default: json
        - name: source
          in: query
          schema:
            type: string
            enum: [hot, archive, all]
            default: hot
        - name: type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5000
      responses:
        '200':
          description: JSON export envelope or CSV attachment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationalRecordsExport'
            text/csv:
              schema:
                type: string
                format: binary
