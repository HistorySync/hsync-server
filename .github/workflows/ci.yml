name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  vuln-check:
    name: Dependency vulnerability check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Run govulncheck
        shell: pwsh
        run: .\scripts\vuln-check.ps1
      - name: Upload vulnerability reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ce-vuln-report
          path: build/vuln/**

  release-check:
    name: Release candidate gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Run release candidate gate
        shell: pwsh
        run: .\scripts\release-check.ps1 -ReportPath build/release-report-ce.json
      - name: Upload release report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ce-release-report
          path: |
            build/release-report-ce.json
            build/release-artifact-manifest-ce.json
            build/release-check/**
            build/release-artifacts/**
            build/sbom/**

  api-compatibility:
    name: API compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: OpenAPI compatibility check
        run: go test ./docs/api

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build
        run: go build ./...
      - name: Unit tests
        run: make test

  integration:
    name: Integration tests (PostgreSQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      # ubuntu-latest ships a running Docker daemon, so testcontainers starts
      # its own ephemeral postgres:16-alpine; no service container is needed.
      - name: Integration tests
        run: make test-integration
