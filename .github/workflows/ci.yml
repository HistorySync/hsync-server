name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api-compatibility:
    name: API compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: OpenAPI compatibility check
        run: go test ./docs/api

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build
        run: go build ./...
      - name: Unit tests
        run: make test

  integration:
    name: Integration tests (PostgreSQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      # ubuntu-latest ships a running Docker daemon, so testcontainers starts
      # its own ephemeral postgres:16-alpine; no service container is needed.
      - name: Integration tests
        run: make test-integration
