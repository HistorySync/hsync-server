# HistorySync Cloud Server - Default Configuration
# All values can be overridden with HSYNC_* environment variables.

# HTTP server listen address
listen_addr: ":8080"

# Minimal web surface mounted by the backend for future console/dashboard use.
web_enabled: true
web_app_name: "HistorySync Cloud Server"
web_console_path: "/console"
web_support_email: "support@historysync.app"
# Public base URL used in emails, such as password reset links.
public_url: "http://localhost:8080"

# Log level: debug, info, warn, error
log_level: "info"

# PostgreSQL connection
database_url: "postgres://hsync:hsync@localhost:5432/hsync?sslmode=disable"

# Redis connection (optional — rate limiting is disabled if unavailable)
redis_url: "redis://localhost:6379/0"

# S3-compatible object storage
s3_endpoint: "localhost:9000"
s3_bucket: "hsync-bundles"
s3_access_key: "minioadmin"
s3_secret_key: "minioadmin"
s3_use_ssl: false

# JWT signing key (base64-encoded 32-byte Ed25519 seed)
# Generate: openssl rand -base64 32
# jwt_private_key: ""  # MUST be set via HSYNC_JWT_PRIVATE_KEY env var

# Secret encryption key for local server-side secrets such as TOTP seeds.
# Must be a base64-encoded 32-byte value. Generate: openssl rand -base64 32
# security_secret: ""  # MUST be set via HSYNC_SECURITY_SECRET env var

# Stripe billing (set stripe_disabled: true for self-hosted without billing)
stripe_disabled: true
# stripe_secret_key: ""
# stripe_webhook_secret: ""

# Admin API key (set to enable /admin/* endpoints)
# admin_key: ""

# Cloudflare Turnstile bot protection for public auth routes.
# When enabled, register/login/forgot-password/resend-verification requests must
# include turnstile_token in the JSON body.
turnstile_enabled: false
# turnstile_secret: ""
# turnstile_site_key: ""
turnstile_timeout: "3s"

# Background maintenance tasks
# Periodic jobs run on a single instance at a time (leader-elected via a Postgres
# advisory lock). Set background_tasks_enabled: false to disable all of them.
background_tasks_enabled: true
# Reconcile every user's storage-usage counters from the source rows to heal any
# drift. "0" disables just this task.
quota_reconcile_interval: "24h"
# Retention cleanup permanently deletes bundles that were soft-deleted long ago.
# It is destructive, so it is OFF by default behind a double opt-in:
#   1. set retention_cleanup_interval > 0 to run the task, AND
#   2. set retention_dry_run: false to actually delete.
# While retention_dry_run is true the task only logs how much WOULD be purged.
retention_cleanup_interval: "0"
retention_grace_period: "720h"  # 30 days; only purge bundles soft-deleted longer ago than this
retention_dry_run: true

# Dynamic runtime options file. When set, the server reads key=value pairs from
# this YAML file on startup and exposes GET/PUT /admin/options at runtime so an
# operator can change select settings without restarting. Leave empty to disable.
# options_file: "configs/options.yaml"

# User-facing notifications. Disabled by default in CE; when disabled, the
# server keeps core flows working and logs notification events instead of
# delivering mail. Enable SMTP to send password reset and quota emails.
notifications_enabled: false
quota_warning_threshold: 80
quota_exhausted_threshold: 100
# Paths appended to public_url when building email action links.
email_verification_path: "/verify-email"
password_reset_path: "/reset-password"

# SMTP configuration. All values can also come from HSYNC_SMTP_* environment
# variables. smtp_tls_mode may be "starttls" (587), "tls" (465), or "none".
smtp_enabled: false
# smtp_server: "smtp.example.com"
smtp_port: 587
# smtp_username: ""
# smtp_password: ""
# smtp_from: "noreply@historysync.app"
smtp_from_name: "HistorySync Cloud"
smtp_tls_mode: "starttls"
