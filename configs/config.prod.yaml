# HistorySync Cloud Server - Production Config Override
listen_addr: ":8080"
log_level: "info"
web_enabled: true
web_app_name: "HistorySync Cloud Server"
web_console_path: "/console"
s3_use_ssl: true
stripe_disabled: true
# database_url, s3_*, jwt_private_key, and security_secret should come from
# HSYNC_* env vars. CE billing is a no-op extension seam; commercial billing
# secrets are configured by HistorySync Enterprise, not this CE config.

# Background maintenance runs by default (leader-elected). Retention purge is
# opt-in and destructive; enable it only after reviewing the dry-run logs:
# retention_cleanup_interval: "24h"
# retention_grace_period: "720h"   # 30 days
# retention_dry_run: false         # set false only once the dry-run report looks right
# Operational history archive/purge is separately opt-in:
# history_retention_interval: "24h"
# history_hot_retention: "2160h"       # 90 days hot
# history_archive_retention: "8760h"   # 365 days total
# history_retention_dry_run: false
